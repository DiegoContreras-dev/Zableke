worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
  gzip_min_length 1024;

  upstream nextjs {
    server app:3000;
  }

  # HTTP → redirige todo a HTTPS
  server {
    listen 80;
    server_name 172.16.13.103.nip.io;
    return 301 https://$host$request_uri;
  }

  # HTTPS — SSL termination + proxy a Next.js
  server {
    listen 443 ssl;
    server_name 172.16.13.103.nip.io;

    ssl_certificate     /etc/letsencrypt/live/172.16.13.103.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/172.16.13.103.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Archivos estáticos de Next.js — caché del navegador (inmutable)
    location /_next/static/ {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Todo lo demás va a la app
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
      proxy_connect_timeout 10s;
    }
  }
}
