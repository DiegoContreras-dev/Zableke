services:
  db:
    image: postgres:16-alpine
    container_name: zableke-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zableke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zableke_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zableke}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/scripts/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: zableke-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx/certs:/etc/letsencrypt/live/172.16.13.103.nip.io:ro,z

  minio:
    image: minio/minio:latest
    container_name: zableke-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zableke}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zableke-local-dev}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: zableke-minio-init
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./config/forms:/forms:ro,z
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/config &&
        mc cp /forms/tutor-form.json local/config/forms/tutor-form.json &&
        echo 'MinIO inicializado correctamente.'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zableke}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zableke-local-dev}
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zableke-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
      GOOGLE_FORM_EDITOR_EMAIL: ${GOOGLE_FORM_EDITOR_EMAIL:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zableke}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zableke-local-dev}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-config}
    init: true
    command:
      - sh
      - -c
      - |
        set -e
        export DATABASE_URL="$$(printf '%s' "$$DATABASE_URL" | sed 's/@localhost:/@db:/')"
        echo "========================================"
        echo "Esperando y sincronizando esquema con la BD..."
        attempt=1
        until node db-sync.cjs; do
          if [ "$$attempt" -ge 10 ]; then
            echo "No fue posible conectar con PostgreSQL tras 10 intentos."
            exit 1
          fi
          echo "PostgreSQL no disponible. Reintento $$attempt/10 en 3 segundos..."
          attempt=$$((attempt + 1))
          sleep 3
        done
        echo "Zableke app iniciada"
        echo "Login:    http://localhost:3000/login"
        echo "GraphQL:  http://localhost:3000/api/graphql"
        echo "========================================"
        exec node server.js

volumes:
  postgres_data:
    name: zableke_postgres_data
  minio_data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
