# docker-compose.yml — Zableke: Sistema de Tutorías UCN

services:
  db:
    image: postgres:16-alpine
    container_name: zableke-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zableke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zableke_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zableke}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zableke}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
