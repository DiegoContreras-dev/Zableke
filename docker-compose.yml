# docker-compose.yml — Zableke: Sistema de Tutorías UCN

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zableke-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL}
    init: true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    container_name: zableke-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zableke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zableke_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zableke}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zableke}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
